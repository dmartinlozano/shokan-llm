# LiteLLM Helm Chart Values
# Default values for litellm deployment

replicaCount: 1

image:
  repository: ghcr.io/berriai/litellm
  pullPolicy: Always
  tag: "main-latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: litellm.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

persistence:
  enabled: true
  storageClassName: "standard"
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /app/data
  # existingClaim: ""

nodeSelector: {}

tolerations: []

affinity: {}

auth:
  secretName: "shokanllm-secret"

# LiteLLM specific configuration
litellm:
  port: 8000
  proxyEnabled: true

  logging:
    level: "INFO"

# Environment variables (API keys, etc.)
env: []

# ConfigMap for litellm_config.yaml
configMap:
  enabled: true
  litellm_config_yaml: |
    general_settings:
      store_model_in_db: false
      drop_params: true
      allow_client_side_credentials: true

    router_settings:
      num_retries: 2
      timeout: 120

# Additional volumes
extraVolumes: []

# Additional volume mounts
extraVolumeMounts: []

# Lifecycle hooks
lifecycle: {}
