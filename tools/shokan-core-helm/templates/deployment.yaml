apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shokan-core.fullname" . }}
  labels:
    {{- include "shokan-core.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "shokan-core.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shokan-core.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "shokan-core.fullname" . }}
      containers:
      - name: shokan-core
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 7860
          protocol: TCP
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.secretName }}
              key: oidc-client-secret-shokan-core
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.secretName }}
              key: session-secret
        - name: KC_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.secretName }}
              key: kc-svc-password
        - name: OPENFGA_STORE_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.secretName }}
              key: openfga-store-id
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.auth.secretName }}
              key: litellm-master-key
        {{- if .Values.persistence.enabled }}
        - name: CHAT_DATA_DIR
          value: {{ .Values.persistence.mountPath | quote }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: chat-data
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
      - name: chat-data
        persistentVolumeClaim:
          claimName: {{ include "shokan-core.fullname" . }}-chats
      {{- end }}
