# Example file: values-production.yaml
# Usage: helm install ollama ./ollama-helm -f values-production.yaml

replicaCount: 1

image:
  repository: ollama/ollama
  tag: "latest"
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 8000m
    memory: 16Gi
  requests:
    cpu: 4000m
    memory: 8Gi

persistence:
  enabled: true
  size: 200Gi
  storageClassName: "fast-ssd"  # Adjust to match your cluster

service:
  type: ClusterIP
  annotations: {}

# Selectores de nodos para ejecutar en máquinas específicas
nodeSelector:
  workload: llm

# Toleraciones para nodos con taints
tolerations:
  - key: "workload"
    operator: "Equal"
    value: "llm"
    effect: "NoSchedule"

# Afinidad para colocación de pods
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: compute
              operator: In
              values:
                - high-memory

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: ollama.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ollama-tls
      hosts:
        - ollama.example.com

ollama:
  models:
    - mistral
    - neural-chat
  environment:
    OLLAMA_HOST: "0.0.0.0:11434"
    # OLLAMA_NUM_GPU: "1"  # Uncomment if you have a GPU
    OLLAMA_DEBUG: "1"
